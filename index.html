<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSER REICH - RAPHI & NEXO 👑</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@200;400;600;800&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-love: #ff4757; 
            --accent-gold: #f1c40f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-glow: 0 0 20px rgba(255, 71, 87, 0.3);
            
            --gradient-1: #0f0c29; 
            --gradient-2: #302b63; 
            --gradient-3: #24243e; 
        }

        html { scroll-behavior: smooth; }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-love);
            border-radius: 10px;
        }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            margin: 20px 0;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        .login-card input:focus { border-color: var(--primary-love); box-shadow: var(--shadow-glow); }

        .btn-login {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: var(--primary-love);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-login:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* --- MAIN APP --- */
        #app { padding-bottom: 100px; }

        header {
            padding: 150px 20px 80px;
            text-align: center;
        }

        .main-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: clamp(3rem, 15vw, 8rem);
            margin: 0;
            background: linear-gradient(to bottom, #ffffff, #a1a1a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        /* --- TIMER --- */
        .countdown-section {
            max-width: 1000px;
            margin: 0 auto 100px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .timer-unit {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 25px;
            min-width: 140px;
            text-align: center;
            border-bottom: 4px solid var(--primary-love);
        }

        .timer-unit span {
            display: block;
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            color: var(--accent-gold);
        }

        /* --- CARDS --- */
        .profiles {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 20px;
            perspective: 1500px;
        }

        .card {
            width: 350px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        .img-container {
            width: 100%;
            height: 350px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 20px;
            transform: translateZ(50px);
        }

        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .card h3 { 
            font-family: 'Oswald'; 
            font-size: 2.2rem; 
            color: var(--accent-gold); 
            transform: translateZ(30px);
        }

        /* --- MASONRY GALLERY --- */
        .gallery-container { max-width: 1200px; margin: 100px auto; padding: 0 20px; }
        .masonry { column-count: 3; column-gap: 20px; }
        .masonry-item { 
            margin-bottom: 20px; 
            break-inside: avoid; 
            border-radius: 20px; 
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: 0.4s;
        }
        .masonry-item:hover { transform: translateY(-10px); border-color: var(--primary-love); }
        .masonry-item img { width: 100%; display: block; }

        /* --- CONTROLS --- */
        .music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1DB954;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .particle {
            position: fixed;
            top: -50px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        @media (max-width: 768px) {
            .masonry { column-count: 1; }
            .profiles { gap: 20px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="particle-rain"></div>

    <div id="login-overlay">
        <div class="login-card" id="login-box">
            <div style="font-size: 50px; margin-bottom: 10px;">👑</div>
            <h2 style="font-family: 'Oswald'; letter-spacing: 3px;">EINTRITT</h2>
            <p style="opacity: 0.6;">Zwei Könige, eine Website.</p>
            <input type="password" id="pw-input" placeholder="PASSWORT">
            <button class="btn-login" onclick="verify()">Öffnen ✨</button>
            <div id="err" style="display:none; color: var(--primary-love); margin-top: 15px;">Versuchs nochmal, Bro! ❤️</div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <h1 class="main-title">Raphi & Nexo</h1>
            <div id="typewriter-text" style="font-size: 1.5rem; letter-spacing: 5px; margin-top: 20px;">
                <span id="tw-text"></span><span style="animation: blink 1s infinite;">|</span>
            </div>
        </header>

        <div class="countdown-section">
            <div class="timer-unit"><span id="d">00</span><label>Tage</label></div>
            <div class="timer-unit"><span id="h">00</span><label>Stunden</label></div>
            <div class="timer-unit"><span id="m">00</span><label>Minuten</label></div>
            <div class="timer-unit"><span id="s">00</span><label>Sekunden</label></div>
        </div>

        <div class="profiles">
            <div class="card tilt-card">
                <div class="img-container"><img src="Raphi3.png" alt="Raphi"></div>
                <h3>Raphi 👑</h3>
                <p>Mein Fels. Mein Stolz. Mein König.</p>
            </div>
            <div class="card tilt-card">
                <div class="img-container"><img src="Nexo.png" alt="Nexo"></div>
                <h3>Nexo 👑</h3>
                <p>Mein Ein und Alles. Jeden Tag aufs Neue.</p>
            </div>
        </div>

        <div class="gallery-container">
            <h2 style="font-family: 'UnifrakturMaguntia'; font-size: 4rem; text-align: center; margin-bottom: 50px;">Unsere Momente</h2>
            <div class="masonry">
                <div class="masonry-item"><img src="Raphi2.png"></div>
                <div class="masonry-item"><img src="20260331_102945.jpg"></div>
                <div class="masonry-item"><img src="Nexo2.png"></div>
                </div>
        </div>

        <footer style="text-align: center; padding: 100px 20px;">
            <p style="font-family: 'UnifrakturMaguntia'; font-size: 3rem;">Ewig Uns.</p>
            <p style="opacity: 0.4;">27. Juli 2026</p>
        </footer>

        <a href="#" onclick="toggleMusic()" class="music-toggle" id="music-btn">
            🎧 Musik an
        </a>
    </div>

    <script>
        // 1. Passwort Logik
        function verify() {
            const val = document.getElementById('pw-input').value.trim();
            const box = document.getElementById('login-box');
            
            if (btoa(val) === "UmFwaGlAMjAyNg==") {
                document.getElementById('login-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    startEverything();
                }, 1000);
            } else {
                box.classList.add('shake');
                document.getElementById('err').style.display = 'block';
                setTimeout(() => box.classList.remove('shake'), 400);
            }
        }

        // 2. Start-Sequenz
        function startEverything() {
            initParticles();
            initTypewriter();
            initTilt();
            setInterval(updateTimer, 1000);
        }

        // 3. Partikel Effekt
        function initParticles() {
            const container = document.getElementById('particle-rain');
            const icons = ['❤️', '✨', '👑', '💎', '🔥'];
            
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.fontSize = (Math.random() * 20 + 10) + 'px';
                p.style.animationDuration = (Math.random() * 3 + 5) + 's';
                p.style.opacity = Math.random();
                container.appendChild(p);
                setTimeout(() => p.remove(), 8000);
            }, 400);
        }

        // 4. Typewriter
        function initTypewriter() {
            const text = "Zwei Könige. Eine Liebe. Ewig.";
            let i = 0;
            const target = document.getElementById("tw-text");
            function type() {
                if (i < text.length) {
                    target.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        // 5. Tilt Effekt (Desktop)
        function initTilt() {
            const cards = document.querySelectorAll('.tilt-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    card.style.transform = `perspective(1000px) rotateY(${x * 20}deg) rotateX(${y * -20}deg) scale3d(1.05, 1.05, 1.05)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
                });
            });
        }

        // 6. Timer
        function updateTimer() {
            const target = new Date("July 27, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }
        }

        // 7. Musik Toggle
        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "⏸️ Pause";
                btn.style.background = "#ff4757";
            } else {
                audio.pause();
                btn.innerHTML = "🎧 Musik an";
                btn.style.background = "#1DB954";
            }
        }
    </script>
</body>
</html>
